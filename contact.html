    <section class="section-padding">

            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="glass-card p-4 p-md-5">
                        <form id="contact-form" onsubmit="event.preventDefault(); alert('Thank you! Your message has been sent.');">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <input type="text" class="form-control-custom" placeholder="Your Name" required>
                                </div>
                                <div class="col-md-6">
                                    <input type="email" class="form-control-custom" placeholder="Your Email Address" required>
                                </div>
                                <div class="col-12">
                                    <input type="text" class="form-control-custom" placeholder="Subject" required>
                                </div>
                                <div class="col-12">
                                    <textarea class="form-control-custom" rows="4" placeholder="Your Message..." required></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn-hero-primary w-100 justify-content-center">
                                        <i class="fas fa-paper-plane me-1"></i> Send Message
                                    </button>
                                </div>
                            </div>
                        </form>
